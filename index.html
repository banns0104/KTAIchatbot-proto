/* ── ATOMS ─────────────────────────────────────────────────────────────── */
function Av({c,size=44}){
  const idx=c.id?c.id.charCodeAt(c.id.length-1)%ACOLORS.length:0;
  return(
    <div style={{position:'relative',flexShrink:0}}>
      <div style={{width:size,height:size,borderRadius:'50%',background:ACOLORS[idx],
        display:'flex',alignItems:'center',justifyContent:'center',
        color:'#fff',fontSize:size*.38,fontWeight:800}}>
        {c.avatar}
      </div>
      {c.online&&<div style={{position:'absolute',bottom:1,right:1,
        width:size*.22,height:size*.22,borderRadius:'50%',background:C.green,
        border:`${Math.max(1.5,size*.055)}px solid #fff`}}/>}
    </div>
  );
}
function Bdg({n}){
  if(!n)return null;
  return<div style={{minWidth:17,height:17,borderRadius:9,background:C.red,
    color:'#fff',fontSize:9.5,fontWeight:700,display:'flex',alignItems:'center',
    justifyContent:'center',padding:'0 4px'}}>{n>99?'99+':n}</div>;
}
function LexAv({size=36}){
  return<div style={{width:size,height:size,borderRadius:size*.27,flexShrink:0,
    background:'linear-gradient(135deg,#E30613,#8A0009)',
    display:'flex',alignItems:'center',justifyContent:'center',
    color:'#fff',fontSize:size*.32,fontWeight:900,fontFamily:"'DM Mono',monospace",
    boxShadow:'0 2px 8px rgba(227,6,19,.2)'}}>L</div>;
}
function TypDots(){
  return<div style={{display:'flex',alignItems:'center',gap:5,padding:'9px 13px',
    background:'rgba(255,241,242,.9)',borderRadius:'13px 13px 13px 4px',
    border:'1px solid #FFDADC'}}>
    {[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:'50%',background:C.red,
      animation:'lexDot 1.2s ease infinite',animationDelay:`${i*.18}s`}}/>)}
    <span style={{fontSize:10,color:C.red,marginLeft:3,fontFamily:"'DM Mono',monospace"}}>LEX 분석 중...</span>
  </div>;
}
function md(text,isU){
  return text.split('\n').map((line,i)=>{
    const p=line.split(/\*\*(.*?)\*\*/g).map((s,j)=>j%2===1?<strong key={j}>{s}</strong>:s);
    if(line.startsWith('- ')||line.startsWith('• '))
      return<div key={i} style={{display:'flex',gap:6,marginTop:3}}>
        <span style={{color:isU?'rgba(255,255,255,.7)':C.red,flexShrink:0,fontSize:11}}>▸</span>
        <span>{p}</span></div>;
    if(line==='')return<div key={i} style={{height:4}}/>;
    return<div key={i}>{p}</div>;
  });
}

/* ── REG CHAT ───────────────────────────────────────────────────────────── */
function RegChat({contact,onBack,onLex}){
  const [msgs,setMsgs]=useState(contact.msgs.map(m=>({...m})));
  const [inp,setInp]=useState('');
  const [focus,setFocus]=useState(false);
  const [emoji,setEmoji]=useState(false);
  const [lexLoad,setLexLoad]=useState(false);
  const bot=useRef(null);
  const inr=useRef(null);

  useEffect(()=>{bot.current?.scrollIntoView({behavior:'smooth'});},[msgs]);
  const kws=useMemo(()=>detectKws(msgs),[msgs]);
  const isLex=inp.startsWith('@LEX')||inp.startsWith('@lex');

  const askLex=async(prompt,label)=>{
    if(lexLoad)return;
    const tid=Date.now();
    setMsgs(p=>[...p,{id:tid,isLexTyping:true}]);
    setLexLoad(true);
    const rep=await mockAsk(prompt);
    setMsgs(p=>p.filter(m=>m.id!==tid).concat({isLex:true,content:rep,time:ts(),label}));
    setLexLoad(false);
  };

  const send=(text)=>{
    const t=(text||inp).trim();if(!t)return;
    if(isLex||t.startsWith('@LEX')||t.startsWith('@lex')){
      const q=t.replace(/^@[Ll][Ee][Xx]\s*/,'').trim();
      if(!q)return;
      setInp('');if(inr.current)inr.current.style.height='auto';
      setMsgs(p=>[...p,{from:'me',content:t,time:ts()}]);
      askLex(q,'LEX 검색');return;
    }
    setInp('');setEmoji(false);if(inr.current)inr.current.style.height='auto';
    setMsgs(p=>[...p,{from:'me',content:t,time:ts()}]);
    setTimeout(()=>setMsgs(p=>[...p,{from:'them',content:'확인했습니다. 잠시 후 답변 드리겠습니다.',time:ts()}]),1200);
  };

  return(
    <div className="phone-inner" style={{background:C.bg}}>
      {/* Header — 고정 높이 */}
      <div style={{paddingTop:50,paddingBottom:10,paddingLeft:12,paddingRight:12,
        background:C.surface,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:9}}>
          <button onClick={onBack} style={{width:32,height:32,borderRadius:9,
            background:C.surfaceAlt,border:`1px solid ${C.border}`,
            display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <path d="M15 18L9 12L15 6" stroke={C.textSec} strokeWidth="2.2" strokeLinecap="round"/>
            </svg>
          </button>
          <Av c={contact} size={38}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:700,color:C.textPri}}>{contact.name}</div>
            <div style={{display:'flex',alignItems:'center',gap:4,marginTop:1}}>
              {contact.online
                ?<><div style={{width:5,height:5,borderRadius:'50%',background:C.green}}/>
                   <span style={{fontSize:10.5,color:C.textSec}}>온라인</span></>
                :<span style={{fontSize:10.5,color:C.textTer}}>오프라인</span>}
            </div>
          </div>
          <button onClick={onLex}
            style={{display:'flex',alignItems:'center',gap:5,padding:'5px 9px',
              borderRadius:18,background:C.redLight,border:'1px solid #FFDADC',
              color:C.red,fontSize:11,fontWeight:700}}
            onMouseEnter={e=>e.currentTarget.style.background='#FFE4E5'}
            onMouseLeave={e=>e.currentTarget.style.background=C.redLight}>
            <LexAv size={15}/> LEX
          </button>
        </div>
      </div>

      {/* Banner */}
      <LexBanner kws={kws} onAsk={askLex}/>

      {/* Messages — flex:1 + overflow scroll */}
      <div style={{flex:1,overflowY:'auto',padding:'8px 12px',
        display:'flex',flexDirection:'column',gap:3}}
        onClick={()=>setEmoji(false)}>
        <div style={{textAlign:'center',marginBottom:4}}>
          <span style={{fontSize:10,color:C.textTer,background:C.border,
            borderRadius:20,padding:'2px 11px'}}>오늘</span>
        </div>
        {msgs.map((m,i)=><RegBubble key={m.id||i} msg={m} contact={contact}/>)}
        <div ref={bot}/>
      </div>

      {/* @LEX hint */}
      {isLex&&(
        <div style={{flexShrink:0,margin:'0 10px 4px',padding:'7px 11px',
          borderRadius:11,background:C.redLight,border:'1px solid #FFDADC',
          display:'flex',alignItems:'center',gap:7}}>
          <LexAv size={18}/>
          <span style={{fontSize:11,color:C.red,fontWeight:600}}>
            @LEX 모드 — AI가 이 채팅방에서 직접 답변합니다
          </span>
        </div>
      )}

      {/* Emoji */}
      {emoji&&(
        <div style={{flexShrink:0,margin:'0 10px 5px',background:C.surface,
          borderRadius:12,border:`1px solid ${C.border}`,padding:'8px 10px'}}>
          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
            {EMOJIS.map((e,i)=>(
              <button key={i} onClick={()=>{setInp(p=>p+e);setEmoji(false);inr.current?.focus();}}
                style={{width:32,height:32,borderRadius:7,border:`1px solid ${C.border}`,
                  background:C.bg,fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}
                onMouseEnter={el=>el.currentTarget.style.background=C.surfaceAlt}
                onMouseLeave={el=>el.currentTarget.style.background=C.bg}>{e}</button>
            ))}
          </div>
        </div>
      )}

      {/* Input — 고정 */}
      <div style={{flexShrink:0,borderTop:`1px solid ${C.border}`,
        background:C.surface,padding:'8px 10px 28px'}}>
        {msgs.length<5&&!isLex&&(

        )}
        <div style={{display:'flex',alignItems:'flex-end',gap:6}}>
          <button onClick={()=>setEmoji(p=>!p)}
            style={{width:30,height:30,borderRadius:'50%',
              background:emoji?C.redLight:C.surfaceAlt,
              border:'none',fontSize:15,flexShrink:0,
              display:'flex',alignItems:'center',justifyContent:'center'}}>😊</button>
          <div style={{flex:1,
            background:isLex?'#FFF8F8':focus?C.surface:C.surfaceAlt,
            border:`1.5px solid ${isLex?C.red:focus?C.blue:C.border}`,
            borderRadius:18,padding:'7px 12px',transition:'border-color .2s',
            boxShadow:isLex?`0 0 0 3px ${C.redSoft}`:focus?'0 0 0 3px rgba(37,99,235,.1)':'none'}}>
            <textarea ref={inr} value={inp}
              onChange={e=>setInp(e.target.value)}
              onFocus={()=>setFocus(true)} onBlur={()=>setFocus(false)}
              onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
              onInput={e=>{e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,72)+'px';}}
              placeholder={isLex?'LEX에게 법률 질문...':`${contact.name}에게 메시지... (@LEX)`}
              style={{width:'100%',border:'none',background:'transparent',
                fontSize:13,color:C.textPri,lineHeight:1.5,
                minHeight:20,maxHeight:72,resize:'none',outline:'none',display:'block'}}/>
          </div>
          <button onClick={()=>send()} disabled={!inp.trim()||lexLoad}
            style={{width:36,height:36,borderRadius:'50%',
              background:inp.trim()&&!lexLoad
                ?(isLex?`linear-gradient(135deg,${C.red},#A00010)`:`linear-gradient(135deg,${C.blue},#1D4ED8)`)
                :C.surfaceAlt,

                  borderTopColor:C.red,borderRadius:'50%',animation:'spin .8s linear infinite'}}/>

                 <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"
                   stroke={inp.trim()?'#fff':C.textTer} strokeWidth="2"
                   strokeLinecap="round" strokeLinejoin="round"/>
               </svg>}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── LEX CHAT ───────────────────────────────────────────────────────────── */
function LexChat({onBack}){
  const [msgs,setMsgs]=useState([{role:'assistant',time:ts(),
    content:'안녕하세요. **LEX**입니다.\n\nKT 법률 빅데이터 1,200만 건 기반으로 자본시장법, 금소법, 금감원 가이드라인, 내부통제 규정 등 금융 법률 질의에 즉시 답변드립니다.\n\n아래 빠른 질문으로 시작하거나 직접 입력해보세요.'}]);
  const [inp,setInp]=useState('');
  const [load,setLoad]=useState(false);
  const [hist,setHist]=useState([]);
  const [showQ,setShowQ]=useState(true);
  const [focus,setFocus]=useState(false);
  const bot=useRef(null);
  const inr=useRef(null);

  useEffect(()=>{bot.current?.scrollIntoView({behavior:'smooth'});},[msgs,load]);

  const send=async(text)=>{
    const t=(text||inp).trim();if(!t||load)return;
    setInp('');setShowQ(false);if(inr.current)inr.current.style.height='auto';
    setMsgs(p=>[...p,{role:'user',content:t,time:ts()}]);
    const h=[...hist,{role:'user',content:t}];
    setHist(h);setLoad(true);
    const rep=await mockAsk(t);
    setMsgs(p=>[...p,{role:'assistant',content:rep,time:ts()}]);
    setHist(p=>[...p,{role:'assistant',content:rep}]);
    setLoad(false);setTimeout(()=>inr.current?.focus(),60);
  };

  return(
    <div className="phone-inner" style={{background:C.bg}}>
      {/* Header */}
      <div style={{paddingTop:50,paddingBottom:10,paddingLeft:12,paddingRight:12,
        background:C.surface,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:9}}>
          <button onClick={onBack} style={{width:32,height:32,borderRadius:9,
            background:C.surfaceAlt,border:`1px solid ${C.border}`,
            display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <path d="M15 18L9 12L15 6" stroke={C.textSec} strokeWidth="2.2" strokeLinecap="round"/>
            </svg>
          </button>
          <LexAv size={36}/>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:800,color:C.textPri,
              fontFamily:"'DM Mono',monospace",letterSpacing:'.04em'}}>LEX</div>
            <div style={{display:'flex',alignItems:'center',gap:4,marginTop:1}}>
              <div style={{width:5,height:5,borderRadius:'50%',background:C.green,animation:'pulse 2s ease infinite'}}/>
              <span style={{fontSize:10,color:C.textTer,fontFamily:"'DM Mono',monospace"}}>KT 빅데이터 연동 · 데모 모드</span>
            </div>
          </div>
          <button onClick={()=>{setMsgs([{role:'assistant',content:'새 대화를 시작합니다.',time:ts()}]);setHist([]);setShowQ(true);}}
            style={{width:30,height:30,borderRadius:9,background:C.surfaceAlt,
              border:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'center'}}
            onMouseEnter={e=>e.currentTarget.style.background=C.redLight}
            onMouseLeave={e=>e.currentTarget.style.background=C.surfaceAlt}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
              <path d="M12 5v14M5 12h14" stroke={C.textSec} strokeWidth="2" strokeLinecap="round"/>
            </svg>
          </button>
        </div>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'12px 13px 6px',
        display:'flex',flexDirection:'column',gap:12}}>
        <div style={{textAlign:'center'}}>
          <span style={{fontSize:9.5,color:C.textTer,background:C.border,
            borderRadius:20,padding:'2px 11px',fontFamily:"'DM Mono',monospace"}}>
            {new Date().toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'})}
          </span>
        </div>
        {msgs.map((m,i)=><AIBubble key={i} msg={m}/>)}
        {load&&<div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
          <LexAv size={26}/>
          <div>
            <div style={{fontSize:9.5,color:C.red,marginBottom:3,
              fontFamily:"'DM Mono',monospace",fontWeight:700}}>LEX · KT AI</div>
            <TypDots/>
          </div>
        </div>}
        <div ref={bot}/>
      </div>

      {/* Quick chips */}
      {showQ&&<div style={{flexShrink:0}}>
        <div style={{display:'flex',gap:6,padding:'5px 12px',
          overflowX:'auto',scrollbarWidth:'none'}}>
          {CHIPS.map((c,i)=>(
            <button key={i} onClick={()=>send(c.prompt)}
              style={{flexShrink:0,display:'flex',alignItems:'center',gap:4,
                padding:'6px 11px',background:C.surface,
                border:`1px solid ${C.border}`,borderRadius:20,
                color:C.textSec,fontSize:11.5,whiteSpace:'nowrap',transition:'all .15s'}}
              onMouseEnter={e=>{e.currentTarget.style.background=C.redLight;e.currentTarget.style.borderColor='#FFDADC';e.currentTarget.style.color=C.red;}}
              onMouseLeave={e=>{e.currentTarget.style.background=C.surface;e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.textSec;}}>
              {c.icon} {c.label}
            </button>
          ))}
        </div>
      </div>}

      {/* Input */}
      <div style={{flexShrink:0,padding:'7px 11px 28px',
        background:C.surface,borderTop:`1px solid ${C.border}`}}>
        <div style={{display:'flex',alignItems:'flex-end',gap:7,
          background:focus?C.surface:C.surfaceAlt,
          border:`1.5px solid ${focus?C.red:C.border}`,
          borderRadius:18,padding:'7px 7px 7px 13px',transition:'all .2s',
          boxShadow:focus?`0 0 0 3px ${C.redSoft}`:'none'}}>
          <textarea ref={inr} value={inp}
            onChange={e=>setInp(e.target.value)}
            onFocus={()=>setFocus(true)} onBlur={()=>setFocus(false)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
            onInput={e=>{e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,80)+'px';}}
            placeholder="법령·판례 무엇이든 질문하세요..."
            style={{flex:1,background:'transparent',border:'none',color:C.textPri,
              fontSize:13,lineHeight:1.55,resize:'none',outline:'none',
              minHeight:20,maxHeight:80,caretColor:C.red,padding:0}}/>
          <button onClick={()=>send()} disabled={!inp.trim()||load}
            style={{width:32,height:32,borderRadius:10,
              background:inp.trim()&&!load?`linear-gradient(135deg,${C.red},#A00010)`:C.surfaceAlt,
              border:'none',flexShrink:0,display:'flex',alignItems:'center',
              justifyContent:'center',transition:'all .17s'}}>
            {load?<div style={{width:11,height:11,border:`2px solid #FFDADC`,
                borderTopColor:C.red,borderRadius:'50%',animation:'spin .8s linear infinite'}}/>
              :<svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                 <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"
                   stroke={inp.trim()&&!load?'#fff':C.textTer} strokeWidth="2"
                   strokeLinecap="round" strokeLinejoin="round"/>
               </svg>}
          </button>
        </div>
        <div style={{textAlign:'center',fontSize:9,color:C.textTer,marginTop:5,
          fontFamily:"'DM Mono',monospace"}}>
          🔒 KT 보안채널 · 데모 모드 (실제 API 미연동)
        </div>
      </div>
    </div>
  );
}

/* ── CONTACT ROW ────────────────────────────────────────────────────────── */
function CRow({c,active,onSel}){
  return(
    <div onClick={()=>onSel(c.id)}
      style={{margin:'1px 6px',padding:'9px 8px',borderRadius:12,
        background:active?C.blueLight:'transparent',
        border:`1.5px solid ${active?C.border:'transparent'}`,
        cursor:'pointer',display:'flex',alignItems:'center',gap:10,transition:'all .12s'}}
      onMouseEnter={e=>{if(!active)e.currentTarget.style.background=C.surfaceAlt;}}
      onMouseLeave={e=>{if(!active)e.currentTarget.style.background='transparent';}}>
      <Av c={c} size={42}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,fontWeight:700,color:C.textPri,marginBottom:2}}>{c.name}</div>
        <div style={{fontSize:11,color:C.textSec,
          whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.sub}</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3,flexShrink:0}}>
        <span style={{fontSize:9.5,color:C.textTer}}>{c.unread>0?'지금':'어제'}</span>
        <Bdg n={c.unread}/>
      </div>
    </div>
  );
}

          <path d="M23 4V8C23.8 7.6 24.5 7 24.5 6 24.5 5 23.8 4.4 23 4Z" fill={C.textPri} fillOpacity=".35"/>
        </svg>
      </div>
    </div>
  );
}

/* ══════════════════════════════ ROOT ════════════════════════════════════ */
function App(){
  const [screen,setScreen]=useState('splash');
  const [view,  setView]  =useState('list'); // list|chat|lex
  const [conts, setConts] =useState(CONTACTS);
  const [actId, setActId] =useState(null);
  const [winW,  setWinW]  =useState(window.innerWidth);
  const [winH,  setWinH]  =useState(window.innerHeight);

  useEffect(()=>{
    const h=()=>{setWinW(window.innerWidth);setWinH(window.innerHeight);};
    window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);
  },[]);

  const isReal=winW<640;
  const actC=conts.find(c=>c.id===actId);

  const sel=useCallback((id)=>{
    setConts(p=>p.map(c=>c.id===id?{...c,unread:0}:c));
    setActId(id);setView('chat');
  },[]);

  /* 내부 UI (항상 모바일) */
  const ui=(
    <div style={{position:'absolute',inset:0,overflow:'hidden'}}>
      <SBar/>
      {screen==='splash'
        ?<Splash onStart={()=>{setScreen('m');setView('list');}}/>
        :view==='list'
          ?<MsgList contacts={conts} onSel={sel} activeId={actId} onLex={()=>setView('lex')}/>
          :view==='lex'
            ?<LexChat onBack={()=>setView('list')}/>
            :actC
              ?<RegChat key={actC.id} contact={actC}
                  onBack={()=>setView('list')} onLex={()=>setView('lex')}/>
              :null}
    </div>
  );

  /* 실제 모바일: 풀스크린 */
  if(isReal) return(
    <div style={{width:'100%',height:'100%',background:C.bg,position:'relative',overflow:'hidden'}}>
      {ui}
    </div>
  );

  /* ── 데스크탑: 폰 목업 ─────────────────────────────────────────────── */
  /* 뷰포트 높이에 맞게 scale */
  const PHONE_W=390, PHONE_H=844, SHELL=12;
  const availH=winH-60;          // 상하 30px 여백
  const availW=winW-200;         // 좌우 100px 여백
  const scaleH=(availH)/(PHONE_H+SHELL*2);
  const scaleW=(availW)/(PHONE_W+SHELL*2);
  const scale=Math.min(1, scaleH, scaleW);

  return(
    <div style={{width:'100%',height:'100%',display:'flex',
      alignItems:'center',justifyContent:'center',
      background:'#E8EBF2',
      backgroundImage:'radial-gradient(circle,#C4C8D8 1px,transparent 1px)',
      backgroundSize:'28px 28px',overflow:'hidden'}}>

      {/* 좌상단 브랜드 */}
      <div style={{position:'fixed',top:20,left:24,
        display:'flex',alignItems:'center',gap:8,zIndex:10}}>
        <div style={{width:30,height:30,borderRadius:9,
          background:'linear-gradient(135deg,#E30613,#8A0009)',
          display:'flex',alignItems:'center',justifyContent:'center',
          fontWeight:900,color:'#fff',fontSize:12,
          fontFamily:"'DM Mono',monospace"}}>L</div>
        <div>
          <div style={{fontSize:13,fontWeight:800,color:'#2A2D3E',
            fontFamily:"'DM Mono',monospace"}}>LEX</div>
          <div style={{fontSize:9,color:'#8A8EA8',
            fontFamily:"'DM Mono',monospace",letterSpacing:'.1em'}}>KT LEGAL AI</div>
        </div>
      </div>
      {/* 우상단 뱃지 */}
      <div style={{position:'fixed',top:24,right:24,zIndex:10,
        display:'flex',alignItems:'center',gap:5,
        background:'rgba(255,255,255,.88)',backdropFilter:'blur(8px)',
        borderRadius:18,padding:'4px 11px',
        border:'1px solid rgba(227,6,19,.14)',
        boxShadow:'0 2px 10px rgba(0,0,0,.06)'}}>
        <div style={{width:5,height:5,borderRadius:'50%',background:C.green,animation:'pulse 2s ease infinite'}}/>
        <span style={{fontSize:10,color:'#5E6078',fontFamily:"'DM Mono',monospace"}}>금투협 · 금감원 공인</span>
      </div>

      {/* 폰 목업 — scale 적용, transform-origin: center */}
      <div style={{
        transformOrigin:'center center',
        transform:`scale(${scale})`,
        /* 크기를 줄여도 공간 차지를 그만큼 줄임 */
        width:PHONE_W+SHELL*2,
        height:PHONE_H+SHELL*2,
        borderRadius:52,
        background:'#1A1B26',
        boxShadow:'0 0 0 2px #2E3044,0 28px 70px rgba(0,0,0,.32),inset 0 0 0 1px rgba(255,255,255,.06)',
        padding:SHELL,
        flexShrink:0,
        position:'relative',
      }}>
        {/* 화면 */}
        <div style={{width:'100%',height:'100%',borderRadius:42,
          overflow:'hidden',position:'relative',background:C.bg}}>
          {ui}
        </div>
        {/* 다이나믹 아일랜드 */}
        <div style={{position:'absolute',top:18,left:'50%',
          transform:'translateX(-50%)',width:118,height:33,
          background:'#1A1B26',borderRadius:19,zIndex:300,
          boxShadow:'inset 0 1px 3px rgba(0,0,0,.5)'}}/>
        {/* 사이드 버튼 */}
        <div style={{position:'absolute',top:128,left:-3,width:3,height:30,
          background:'#2E3044',borderRadius:'2px 0 0 2px'}}/>
        <div style={{position:'absolute',top:172,left:-3,width:3,height:54,
          background:'#2E3044',borderRadius:'2px 0 0 2px'}}/>
        <div style={{position:'absolute',top:238,left:-3,width:3,height:54,
          background:'#2E3044',borderRadius:'2px 0 0 2px'}}/>
        <div style={{position:'absolute',top:172,right:-3,width:3,height:78,
          background:'#2E3044',borderRadius:'0 2px 2px 0'}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
